name: Deploy to Production

on:
  push:
    branches: [main]
    tags:
      - "v*.*"
  pull_request:
    branches: [main]
    types: [closed]

jobs:
  test:
    name: Test and Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.9"

      - name: Cache pip packages
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 black pytest pytest-cov
          pip install -r requirements.txt

      - name: Lint with flake8
        run: |
          flake8 src/ --max-line-length=100 --extend-ignore=E203,W503

      - name: Format check with black
        run: |
          black --check src/

      - name: Run tests
        run: |
          pytest tests/ --cov=src --cov-report=xml --cov-report=html --junitxml=test-results.xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage.xml
          flags: unittest
          name: codecov-umbrella

      - name: Archive test results
        uses: actions/upload-artifact@v3
        with:
          name: test-results
          path: test-results.xml

  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            skillgraph-api:latest
            skillgraph-api:${{ github.ref_name }}
            skillgraph-api:${{ github.sha }}

  deploy:
    name: Deploy to Kubernetes
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    environment:
      KUBE_CONFIG: ${{ secrets.KUBE_CONFIG }}
      KUBE_CONTEXT: ${{ secrets.KUBE_CONTEXT || 'default-cluster' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'v1.27.0'

      - name: Configure kubectl
        run: |
          mkdir -p ~/.kube
          echo "$KUBE_CONFIG" > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Create secrets
        run: |
          kubectl create secret generic skillgraph-secrets \
            --from-literal=database-url="${{ secrets.DATABASE_URL }}" \
            --from-literal=redis-url="${{ secrets.REDIS_URL }}" \
            --from-literal=jwt-secret="${{ secrets.JWT_SECRET }}" \
            --from-literal=openai-api-key="${{ secrets.OPENAI_API_KEY }}" \
            --dry-run=client

      - name: Deploy API
        run: |
          kubectl apply -f k8s/api-deployment.yaml
          kubectl rollout status deployment/skillgraph-api

      - name: Wait for deployment
        run: |
          kubectl wait --for=condition=available --timeout=300s deployment/skillgraph-api

      - name: Verify deployment
        run: |
          kubectl get pods -l app=skillgraph
          kubectl describe deployment skillgraph-api

  rollout:
    name: Rollout Update
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'v1.27.0'

      - name: Configure kubectl
        run: |
          mkdir -p ~/.kube
          echo "$KUBE_CONFIG" > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Rollout update
        run: |
          kubectl set image deployment/skillgraph-api \
            skillgraph-api=skillgraph-api:${{ github.sha }}
          kubectl rollout restart deployment/skillgraph-api

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/skillgraph-api --timeout=300s

  health-check:
    name: Health Check
    runs-on: ubuntu-latest
    needs: rollout
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'v1.27.0'

      - name: Configure kubectl
        run: |
          mkdir -p ~/.kube
          echo "$KUBE_CONFIG" > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Health check
        run: |
          kubectl get pods -l app=skillgraph

      - name: Check service health
        run: |
          kubectl describe service skillgraph-api-service

      - name: API health check
        run: |
          SERVICE_URL=$(kubectl get service skillgraph-api-service -o jsonpath='{.status.loadBalancer.ingress[0].ip}')
          if [ -n "$SERVICE_URL" ]; then
            curl -f http://$SERVICE_URL:8000/health
          else
            echo "Load balancer not ready, skipping health check"
          fi

  notify:
    name: Notify on Failure
    runs-on: ubuntu-latest
    needs: [test, build, deploy, rollout, health-check]
    if: failure()
    steps:
      - name: Send notification
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          text: |
            Deployment failed: ${{ github.repository }}
            Commit: ${{ github.sha }}
            Workflow: ${{ github.workflow }}
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}
