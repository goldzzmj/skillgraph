---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: skillgraph-api
  labels:
    app: skillgraph
    version: v1
spec:
  replicas: ${REPLICAS:-3}
  selector:
    matchLabels:
      app: skillgraph
      version: v1
  template:
    metadata:
      labels:
        app: skillgraph
        version: v1
    spec:
      containers:
      - name: skillgraph-api
        image: ${IMAGE:-skillgraph-api}:${IMAGE_TAG:-latest}
        ports:
        - containerPort: 8000
          name: http
          protocol: TCP
        env:
        - name: SKILLGRAPH_ENV
          value: "${SKILLGRAPH_ENV:-production}"
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: skillgraph-secrets
              key: database-url
        - name: REDIS_URL
          valueFrom:
            secretKeyRef:
              name: skillgraph-secrets
              key: redis-url
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: skillgraph-secrets
              key: jwt-secret
        - name: OPENAI_API_KEY
          valueFrom:
            secretKeyRef:
              name: skillgraph-secrets
              key: openai-api-key
        - name: CORS_ALLOW_ORIGINS
          value: "${CORS_ALLOW_ORIGINS:-*}"
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          successThreshold: 1
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          successThreshold: 1
          failureThreshold: 3
        securityContext:
          runAsNonRoot: true
          runAsUser: 1000
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
            add:
            - NET_BIND_SERVICE
---
apiVersion: v1
kind: Service
metadata:
  name: skillgraph-api-service
  labels:
    app: skillgraph
    version: v1
spec:
  type: ClusterIP
  ports:
  - port: 8000
    targetPort: 8000
    protocol: TCP
    name: http
  selector:
    app: skillgraph
    version: v1
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: skillgraph-api-hpa
  labels:
    app: skillgraph
    version: v1
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: skillgraph-api
  minReplicas: ${MIN_REPLICAS:-3}
  maxReplicas: ${MAX_REPLICAS:-10}
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 0.7
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 0.8
  - type: Pods
    pods:
      metric:
        name: http_requests_per_second
      target:
        type: AverageValue
        averageValue: 1000
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 50
        periodSeconds: 60
      - type: Pods
        value: 3
        periodSeconds: 60
      - type: Pods
        value: 1
        periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
      - type: Percent
        value: 100
        periodSeconds: 60
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: skillgraph-api-pdb
  labels:
    app: skillgraph
    version: v1
spec:
  minAvailable: 2
  maxUnavailable: 1
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: skillgraph-config
  labels:
    app: skillgraph
    version: v1
data:
  CORS_ALLOW_ORIGINS: "*"
  LOG_LEVEL: "info"
  RATE_LIMIT_ENABLED: "true"
  RATE_LIMIT_PER_MINUTE: "60"
  RATE_LIMIT_PER_HOUR: "1000"
  RATE_LIMIT_PER_DAY: "10000"
---
